<!DOCTYPE html>

<head>

    <title>Nosso Roteiro Especial ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffe6eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Evita barras de rolagem */
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            display: none; /* Controlado via JS */
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        .card.active {
            display: flex;
        }

        h1 {
            color: #d63384;
            font-size: 22px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-lista {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        /* Botões normais de escolhas */
        .btn-opcao {
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            background-color: #f8f9fa;
            color: #333;
            border: 2px solid #ddd;
            width: 100%;
            display: block;
        }

        .btn-opcao:hover {
            background-color: #e2e6ea;
            transform: translateY(-2px);
        }

        /* Área exclusiva dos botões Sim e Não na tela de fuga */
        .area-botoes-safados {
            position: relative;
            width: 100%;
            height: 140px;
            margin-top: 20px;
        }

        #btn-sim-safado {
            background-color: #28a745;
            color: white;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: absolute;
            left: 5%;
            top: 40px;
            z-index: 10;
            width: 55%;
        }

        #btn-nao-fujao {
            background-color: #dc3545;
            color: white;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            position: absolute;
            right: 5%;
            top: 45px;
            z-index: 999;
            width: 80px; /* Tamanho fixo e pequeno para não esticar */
            border-radius: 8px;
            transition: left 0.08s ease-out, top 0.08s ease-out;
        }

        /* Animação do realce vermelho de fundo */
        @keyframes pulsarVermelho {
            0% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 45px #ff0000; background-color: #ff1e1e; }
            100% { box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
        }

        .midia-resultado {
            max-width: 100%;
            max-height: 280px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            object-fit: contain;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
